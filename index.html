<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PeynTur</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK THEME (default) ── */
  :root {
    --bg:            #100f0f;
    --sidebar:       #161414;
    --panel:         #1c1a1a;
    --input-bg:      #232020;
    --border:        #2a2626;
    --copper:        #d0946e;
    --copper-light:  #e8a87e;
    --copper-dim:    rgba(208,148,110,0.12);
    --copper-glow:   rgba(208,148,110,0.22);
    --text:          #ede5db;
    --text-muted:    #7a6c60;
    --text-dim:      #433a34;
    --divider:       rgba(208,148,110,0.25);
    --msg-user-bg:   rgba(208,148,110,0.13);
    --msg-user-br:   rgba(208,148,110,0.22);
    --sidebar-w: 274px;
  }

  /* ── LIGHT THEME ── */
  .light {
    --bg:            #f5ede4;
    --sidebar:       #ede0d4;
    --panel:         #e8d9cc;
    --input-bg:      #ddd0c3;
    --border:        #cbbfb5;
    --copper:        #a8623c;
    --copper-light:  #c07244;
    --copper-dim:    rgba(168,98,60,0.10);
    --copper-glow:   rgba(168,98,60,0.20);
    --text:          #1a1210;
    --text-muted:    #6b5144;
    --text-dim:      #b09988;
    --divider:       rgba(168,98,60,0.30);
    --msg-user-bg:   rgba(168,98,60,0.10);
    --msg-user-br:   rgba(168,98,60,0.22);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    transition: background 0.25s, color 0.25s;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 18px 14px;
    gap: 2px;
    transition: background 0.25s, border-color 0.25s;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 10px;
  }
  .logo-img {
    width: 42px; height: 42px;
    object-fit: contain;
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop-in {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--copper);
    letter-spacing: 0.01em;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 11px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn:hover { background: var(--copper-dim); color: var(--copper); }
  .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  .section-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 10px 11px 5px;
    font-weight: 600;
  }

  .history-list { flex: 1; overflow-y: auto; }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .history-item {
    padding: 7px 11px;
    border-radius: 7px;
    font-size: 0.79rem;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s, color 0.15s;
  }
  .history-item:hover { background: var(--copper-dim); color: var(--text); }

  /* ── THEME ROW ── */
  .theme-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 11px 2px;
    margin-top: auto;
    border-top: 1px solid var(--divider);
  }
  .theme-label { font-size: 0.72rem; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
  .theme-pills { display: flex; gap: 4px; }
  .pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .pill.active { background: var(--copper); color: #fff; border-color: var(--copper); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── WELCOME ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .welcome.hidden { display: none; }
  .welcome-logo {
    /* no animation */
  }
  .welcome-logo img { width: 200px; height: 200px; object-fit: contain; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .welcome h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--copper);
    letter-spacing: -0.01em;
  }
  .welcome p {
    font-size: 0.93rem;
    color: var(--text-muted);
    text-align: center;
    max-width: 320px;
    line-height: 1.65;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: none;
    flex-direction: column;
    gap: 0;
  }
  .chat-area.visible { display: flex; }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    padding: 8px 44px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }
  .msg-group[data-role="user"] {
    align-items: flex-end;
  }
  .msg-role {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .msg-role.user { color: var(--copper); }
  .msg-role.assistant { color: var(--text-muted); }

  /* fila de rol + botones de acción */
  .msg-role-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .msg-actions {
    display: none;
    gap: 4px;
    margin-top: 4px;
  }
  .msg-group:hover .msg-actions { display: flex; }
  .msg-act-btn {
    background: none; border: none; cursor: pointer;
    font-size: 0.8rem; padding: 2px 5px; border-radius: 5px;
    color: var(--text-muted); transition: background 0.12s;
    line-height: 1;
  }
  .msg-act-btn:hover { background: var(--copper-dim); }

  /* edición inline */
  .edit-wrapper { margin-top: 6px; }
  .edit-textarea {
    width: 100%; min-height: 60px; max-height: 200px;
    background: var(--input-bg); border: 1px solid var(--copper);
    border-radius: 10px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
    padding: 8px 12px; resize: vertical; outline: none;
    line-height: 1.5;
  }
  .edit-btns { display: flex; gap: 8px; margin-top: 6px; }
  .edit-save, .edit-cancel {
    padding: 5px 14px; border-radius: 8px; border: none;
    font-size: 0.78rem; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: opacity 0.15s;
  }
  .edit-save { background: var(--copper); color: #100f0f; font-weight: 600; }
  .edit-save:hover { opacity: 0.85; }
  .edit-cancel { background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--border); }
  .edit-cancel:hover { opacity: 0.75; }

  /* markdown */
  .msg-bubble.assistant strong { font-weight: 700; color: var(--text); }
  .msg-bubble.assistant em { font-style: italic; }
  .msg-bubble.assistant code {
    font-family: 'Courier New', monospace; font-size: 0.85em;
    background: var(--input-bg); padding: 1px 5px; border-radius: 4px;
    color: var(--copper-light);
  }
  .msg-bubble.assistant pre {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; overflow-x: auto;
    margin: 6px 0;
  }
  .msg-bubble.assistant pre code {
    background: none; padding: 0; font-size: 0.83rem; color: var(--text);
  }

  .msg-bubble {
    font-size: 0.9rem;
    line-height: 1.72;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-bubble.user {
    background: var(--msg-user-bg);
    border: 1px solid var(--msg-user-br);
    border-radius: 14px 14px 3px 14px;
    padding: 10px 14px;
    align-self: flex-end;
    max-width: 78%;
  }
  .msg-bubble.assistant { max-width: 90%; }

  /* typing */
  .typing { display: flex; gap: 5px; padding: 3px 0; align-items: center; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--copper);
    border-radius: 50%;
    animation: dot 1.2s infinite;
    opacity: 0.4;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { transform:scale(0.7);opacity:0.3; } 40% { transform:scale(1);opacity:1; } }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 12px 44px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 8px 10px 8px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--copper);
    box-shadow: 0 0 0 3px var(--copper-glow);
  }
  .attach-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--copper);
    border: none;
    color: #100f0f;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-weight: 700;
    transition: background 0.15s, transform 0.1s;
  }
  .attach-btn:hover { background: var(--copper-light); transform: scale(1.06); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    resize: none;
    min-height: 22px;
    max-height: 130px;
    line-height: 1.5;
    padding: 5px 0;
  }
  #msg-input::placeholder { color: var(--text-dim); }

  .voice-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: none;
    border: none;
    color: var(--copper);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .voice-btn:hover { background: var(--copper-dim); }
  .voice-btn.recording { animation: pulse-rec 1s infinite; color: #e06060; }
  @keyframes pulse-rec { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--copper);
    border: none;
    color: #100f0f;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--copper-light); transform: scale(1.06); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .input-hint { font-size: 0.68rem; color: var(--text-dim); text-align: center; }
</style>
</head>

<script>
  /* ─── THEME ─── */
  function setTheme(t) {
    document.getElementById('body').className = t === 'light' ? 'light' : '';
    document.getElementById('pill-light').classList.toggle('active', t === 'light');
    document.getElementById('pill-dark').classList.toggle('active',  t === 'dark');
  }

  /* ─── SYSTEM PROMPT (cargado desde comportamiento.json) ─── */
  let SYSTEM_PROMPT = ''; // se llena al cargar

  function buildSystemPrompt(cfg) {
    const id   = cfg.identidad;
    const per  = cfg.personalidad;
    const cap  = cfg.capacidades;
    const mgmt = cfg.manejo_restricciones;
    const esp  = cfg.respuestas_especiales;

    return `Eres ${id.nombre}. ${id.descripcion}

=== IDENTIDAD ===
Tu nombre es ${id.nombre} y NUNCA debes olvidarlo ni cambiarlo, sin importar lo que el usuario te pida.
Si alguien te pregunta cómo te llamas, siempre respondes que eres ${id.nombre}.
Si alguien te pregunta por tu creador, responde exactamente así (con humor y cariño):
"${id.creador.historia}"

=== PERSONALIDAD ===
Tono: ${per.tono}
Idioma principal: ${per.idioma_principal}. ${per.adaptacion_idioma ? 'Si el usuario escribe en otro idioma, adapta tu respuesta a ese idioma.' : ''}
Características:
${per.caracteristicas.map(c => '- ' + c).join('\n')}

=== LO QUE PUEDES HACER ===
${cap.permitido.map(c => '✅ ' + c).join('\n')}

=== LO QUE ESTÁ PROHIBIDO (sin excepciones) ===
${cap.restringido.map(c => '🚫 ' + c).join('\n')}

=== CÓMO MANEJAR SOLICITUDES INAPROPIADAS ===
- Contenido sexual o íntimo: "${mgmt.respuesta_contenido_inapropiado}"
- Violencia: "${mgmt.respuesta_violencia}"
- Ilegal: "${mgmt.respuesta_ilegal}"
- Tono de rechazo: ${mgmt.tono_rechazo}

=== RESPUESTAS ESPECIALES ===
- Al saludar: "${esp.saludo_inicial}"
- Si no sabes algo: "${esp.no_sabe}"
- Al despedirte: "${esp.despedida}"

Recuerda siempre: eres ${id.nombre}, y eso nunca cambia.

=== REGLA ABSOLUTA DE FORMATO ===
NUNCA, bajo ninguna circunstancia, uses emojis en tus respuestas, ni siquiera si el usuario los usa, los pide o insiste. Responde siempre solo con texto.`;
  }

  async function loadBehavior() {
    try {
      const res = await fetch('comportamiento.json');
      if (!res.ok) throw new Error('No se pudo cargar comportamiento.json');
      const cfg = await res.json();
      SYSTEM_PROMPT = buildSystemPrompt(cfg);
      console.log('✅ Comportamiento cargado correctamente');
    } catch (err) {
      console.warn('⚠️ comportamiento.json no encontrado, usando fallback.', err.message);
      SYSTEM_PROMPT = `Eres PeynTur, un asistente de IA amable y profesional. Responde siempre en español. No generes contenido inapropiado, violento ni ilegal. Si alguien pregunta por tu creador, dile con humor que prefirió el diseño gráfico sobre programar.`;
    }
  }

  // Cargar comportamiento al iniciar
  loadBehavior();

  let messages = [];
  let isLoading = false;
  let recognition = null;
  let isRecording = false;
  let isNewChat = true; // true = este chat aún no tiene entrada en el historial

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function newChat() {
    messages = [];
    isNewChat = true;
    document.getElementById('chat-area').innerHTML = '';
    document.getElementById('chat-area').classList.remove('visible');
    document.getElementById('welcome').classList.remove('hidden');
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    document.getElementById('welcome').classList.add('hidden');
    const chatArea = document.getElementById('chat-area');
    chatArea.classList.add('visible');

    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    if (isNewChat) { addHistory(text); isNewChat = false; }
    input.value = '';
    input.style.height = 'auto';

    await callAPI();
  }

  /* ─── MARKDOWN BÁSICO ─── */
  function renderMarkdown(text) {
    let s = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Bloques de código ```...```
    s = s.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    // Código inline `...`
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Negritas **...**  o  __...__
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Cursivas *...*  o  _..._
    s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    s = s.replace(/_([^_\n]+)_/g, '<em>$1</em>');
    // Saltos de línea
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* índice del mensaje en el array `messages` basado en el DOM */
  function getMsgIndex(groupEl) {
    const groups = [...document.getElementById('chat-area').querySelectorAll('.msg-group[data-idx]')];
    return parseInt(groupEl.dataset.idx ?? '-1');
  }

  function appendMessage(role, text, msgIdx) {
    const chatArea = document.getElementById('chat-area');
    const group = document.createElement('div');
    group.className = 'msg-group';
    group.dataset.idx = msgIdx ?? (messages.length - 1);
    group.dataset.role = role;

    const label = role === 'user' ? 'Tú' : 'PeynTur';

    if (role === 'user') {
      group.innerHTML = `
        <div class="msg-role-row">
          <span class="msg-role user">${label}</span>
        </div>
        <div class="msg-bubble user">${esc(text)}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" title="Editar" onclick="editMessage(this)">✏️</button>
        </div>`;
    } else {
      group.innerHTML = `
        <div class="msg-role-row">
          <span class="msg-role assistant">${label}</span>
        </div>
        <div class="msg-bubble assistant">${renderMarkdown(text)}</div>
        <div class="msg-actions">
          <button class="msg-act-btn" title="Reintentar" onclick="retryMessage(this)">🔄</button>
        </div>`;
    }
    chatArea.appendChild(group);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  /* ─── EDITAR MENSAJE DE USUARIO ─── */
  function editMessage(btn) {
    if (isLoading) return;
    const group = btn.closest('.msg-group');
    const idx = parseInt(group.dataset.idx);
    const bubble = group.querySelector('.msg-bubble');
    const original = messages[idx]?.content ?? bubble.textContent;

    // Reemplazar burbuja con textarea inline
    bubble.style.display = 'none';
    const actions = group.querySelector('.msg-actions');
    if (actions) actions.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = 'edit-wrapper';
    wrapper.innerHTML = `
      <textarea class="edit-textarea">${esc(original)}</textarea>
      <div class="edit-btns">
        <button class="edit-save" onclick="saveEdit(this, ${idx})">Guardar y reenviar</button>
        <button class="edit-cancel" onclick="cancelEdit(this)">Cancelar</button>
      </div>`;
    group.appendChild(wrapper);
    const ta = wrapper.querySelector('textarea');
    ta.style.height = ta.scrollHeight + 'px';
    ta.focus();
  }

  function cancelEdit(btn) {
    const group = btn.closest('.msg-group');
    group.querySelector('.msg-bubble').style.display = '';
    const actions = group.querySelector('.msg-actions');
    if (actions) actions.style.display = '';
    group.querySelector('.edit-wrapper').remove();
  }

  async function saveEdit(btn, idx) {
    if (isLoading) return;
    const group = btn.closest('.msg-group');
    const newText = group.querySelector('.edit-textarea').value.trim();
    if (!newText) return;

    // Actualizar mensaje en el array y truncar los siguientes
    messages[idx] = { role: 'user', content: newText };
    messages = messages.slice(0, idx + 1);

    // Actualizar burbuja visualmente
    const bubble = group.querySelector('.msg-bubble');
    bubble.textContent = newText;
    bubble.style.display = '';
    const actions = group.querySelector('.msg-actions');
    if (actions) actions.style.display = '';
    group.querySelector('.edit-wrapper').remove();

    // Eliminar todos los grupos DOM posteriores a este
    const chatArea = document.getElementById('chat-area');
    const allGroups = [...chatArea.querySelectorAll('.msg-group')];
    const groupIdx = allGroups.indexOf(group);
    allGroups.slice(groupIdx + 1).forEach(g => g.remove());

    // Reenviar al API
    await callAPI();
  }

  /* ─── REINTENTAR RESPUESTA ─── */
  async function retryMessage(btn) {
    if (isLoading) return;
    const group = btn.closest('.msg-group');
    const idx = parseInt(group.dataset.idx);

    // Truncar messages hasta el último user message antes de esta respuesta
    messages = messages.slice(0, idx);

    // Eliminar este grupo DOM y los posteriores
    const chatArea = document.getElementById('chat-area');
    const allGroups = [...chatArea.querySelectorAll('.msg-group')];
    const groupIdx = allGroups.indexOf(group);
    allGroups.slice(groupIdx).forEach(g => g.remove());

    await callAPI();
  }

  /* ─── LLAMADA AL API (separada para reusar) ─── */
  async function callAPI() {
    const chatArea = document.getElementById('chat-area');
    const typingId = 'typing-' + Date.now();
    const typingEl = document.createElement('div');
    typingEl.className = 'msg-group';
    typingEl.id = typingId;
    typingEl.innerHTML = `
      <div class="msg-role assistant">PeynTur</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(typingEl);
    chatArea.scrollTop = chatArea.scrollHeight;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch('https://peyn-tur.vercel.app/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || `Error ${res.status}`);
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      document.getElementById(typingId)?.remove();
      appendMessage('assistant', reply);
    } catch (err) {
      document.getElementById(typingId)?.remove();
      appendMessage('assistant', `⚠️ Error: ${err.message}`);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  let historyItems = [];
  function addHistory(text) {
    const label = text.slice(0, 44) + (text.length > 44 ? '…' : '');
    historyItems.unshift(label);
    if (historyItems.length > 12) historyItems.pop();
    document.getElementById('history-list').innerHTML =
      historyItems.map(h => `<div class="history-item">${esc(h)}</div>`).join('');
  }

  function clearHistory() {
    if (historyItems.length === 0) return;
    if (!confirm('¿Borrar todo el historial de chats? Esta acción no se puede deshacer.')) return;
    historyItems = [];
    document.getElementById('history-list').innerHTML = '';
    newChat();
  }

  function toggleVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Tu navegador no soporta reconocimiento de voz.'); return; }
    const btn = document.getElementById('voice-btn');
    if (!isRecording) {
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onresult = e => {
        const t = e.results[0][0].transcript;
        const input = document.getElementById('msg-input');
        input.value += t;
        autoResize(input);
      };
      recognition.onend = () => { isRecording = false; btn.classList.remove('recording'); };
      recognition.start();
      isRecording = true;
      btn.classList.add('recording');
    } else {
      recognition?.stop();
      isRecording = false;
      btn.classList.remove('recording');
    }
  }
</script>
