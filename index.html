  <!-- CHAT HEADER (visible while in a chat) -->
  <div id="chat-header" style="display:none; align-items:center; justify-content:space-between; padding:10px 44px 0; max-width:780px; width:100%; margin:0 auto; flex-shrink:0;">
    <span id="chat-header-title" style="font-size:0.78rem;color:var(--text-muted);font-family:'Inter',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%;"></span>
    <button onclick="deleteCurrentChat()" title="Borrar este chat"
      style="background:none;border:none;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;gap:5px;font-size:0.75rem;font-family:'Inter',sans-serif;padding:4px 8px;border-radius:7px;transition:background 0.15s,color 0.15s;"
      onmouseover="this.style.background='rgba(200,80,80,0.12)';this.style.color='#e06060'"
      onmouseout="this.style.background='none';this.style.color='var(--text-dim)'">

      Borrar chat
    </button>
  </div>

  <!-- PINNED PANEL -->
  <div id="pinned-panel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:999;align-items:center;justify-content:center;">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;width:min(500px,90vw);max-height:70vh;display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--copper);">Mensajes fijados</span>
        <button onclick="closePinned()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1.2rem;">✕</button>
      </div>

        </svg>

        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="voice-btn" id="voice-btn" title="Voz" onclick="toggleVoice()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">PeynTur puede cometer errores. Verifica información importante.</div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
